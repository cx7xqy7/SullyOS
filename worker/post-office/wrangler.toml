name = "sullyos-post-office"
main = "src/index.ts"
compatibility_date = "2026-01-01"

# 彼方虚拟邮局 —— 跨用户漂流信的共享后端。
#
# 这是一个【所有用户共用】的后端：客户端默认指向你部署的这一个实例
# （如 https://noir2.cc.cd/po），其他用户无需任何配置即可互相通信。
#
# 部署：
#   1) wrangler d1 create sullyos-post-office       # 拿到 database_id
#   2) 把 database_id 填到下面 [[d1_databases]]
#   3) wrangler deploy
#   （表结构 Worker 会自动 CREATE IF NOT EXISTS，不必手动跑 schema.sql）
#
# 路由到 noir2.cc.cd/po/*（二选一）：
#   A. 单独部署本 worker，然后在 Cloudflare 给 noir2.cc.cd/po/* 加一条 Route 指向它；
#   B. 或把 src/index.ts 的 fetch 逻辑并进你现有的 noir2 worker（按 path 结尾匹配，
#      与现有 push 路由不冲突）。
#
# 可选环境变量：
#   PO_MAX_REPLIES  一封信最多被几个设备回信（默认 3）
#   PO_TTL_DAYS     信件保留天数，超期自动清理（默认 30）

[[d1_databases]]
binding = "DB"
database_name = "sullyos-post-office"
database_id = "REPLACE_WITH_YOUR_D1_ID"

# 可选：更准时地清理过期信（默认随请求概率清理，低流量时可开 cron）
# [triggers]
# crons = ["0 */6 * * *"]
